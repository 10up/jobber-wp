name: 'Repo Automator'

on:
  issues:
    types:
      - opened
  push:
    branches:
      - develop
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - converted_to_draft
      - ready_for_review
    branches:
      - develop

jobs:
  Validate:
    runs-on: ubuntu-latest
    if: "${{ github.event_name == 'push' || github.event_name == 'issues' || ( github.event_name == 'pull_request' && ! github.event.pull_request.head.repo.fork ) }}"

    steps:
      - uses: 10up/action-repo-automator@280f5dc0b4ed1b5c50c816e08623bdefce55cdce # v2.1.3
        with:
          fail-label: needs:feedback
          pass-label: needs:code-review
          conflict-label: needs:refresh
          reviewers: |
            team:open-source-practice
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
